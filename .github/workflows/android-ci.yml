name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          
      - name: Run Gradle
        run: |
          cd /tmp
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle.zip
          unzip -q gradle.zip
          cd -
          /tmp/gradle-8.5/bin/gradle -p ${{ github.workspace }} test assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug.apk
          path: ${{ github.workspace }}/app/build/outputs/apk/debug/app-debug.apk
