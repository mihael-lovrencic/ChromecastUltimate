name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
      SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$SIGNING_STORE_FILE"

      - name: Build Dev (Debug) APK
        run: ./gradlew assembleDebug

      - name: Build Production (Release) APK
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: dev-apk
          path: app/build/outputs/apk/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: prod-apk
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          overwrite_files: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
