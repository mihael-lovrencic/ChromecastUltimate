name: Android CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.json'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.vscode/**'
      - '.idea/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.json'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.vscode/**'
      - '.idea/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    defaults:
      run:
        shell: bash
    env:
      SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$SIGNING_STORE_FILE"

      - name: Build Dev (Debug) APK
        run: ./gradlew assembleDebug

      - name: Build Production (Release) APK
        run: ./gradlew assembleRelease

      - name: Read Version Info
        id: version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          VERSION_NAME=$(./gradlew -q :printVersionName --no-configuration-cache --console=plain | tail -n 1 | tr -d '\r')
          VERSION_CODE=$(./gradlew -q :printVersionCode --no-configuration-cache --console=plain | tail -n 1 | tr -d '\r')
          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "Version info missing. VERSION_NAME='$VERSION_NAME' VERSION_CODE='$VERSION_CODE'"
            exit 1
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: dev-apk
          path: app/build/outputs/apk/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: prod-apk
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.version_name != '' && needs.build.outputs.version_code != ''
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.apk
          tag_name: v${{ needs.build.outputs.version_name }}+${{ needs.build.outputs.version_code }}
          name: Release v${{ needs.build.outputs.version_name }}+${{ needs.build.outputs.version_code }}
          overwrite_files: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
