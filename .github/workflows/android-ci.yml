name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: android-builder:latest

    - name: Run tests in Docker
      run: |
        docker run --rm android-builder:latest ./gradlew test

    - name: Build Debug APK in Docker
      run: |
        docker run --rm android-builder:latest ./gradlew assembleDebug

    - name: Copy Debug APK from Docker
      run: |
        docker run --rm -v ${{ github.workspace }}:/output android-builder:latest cp app/build/outputs/apk/debug/app-debug.apk /output/

    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk

  local-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug-local.apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: app/build/reports/tests/testDebugUnitTest/

  release-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build, local-build]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-release-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Get version name
      id: version
      run: |
        VERSION_NAME=$(grep -E "versionName\s+" app/build.gradle | sed 's/.*versionName "\(.*\)"/\1/')
        if [ -z "$VERSION_NAME" ]; then
          VERSION_NAME="1.0.0"
        fi
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release.apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/app-release.apk
        generate_release_notes: true
        tag_name: v${{ steps.version.outputs.VERSION_NAME }}
        name: Release v${{ steps.version.outputs.VERSION_NAME }}
        body: |
          ## APK Release
          - Release APK built from commit ${{ github.sha }}
          - View CI: [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
