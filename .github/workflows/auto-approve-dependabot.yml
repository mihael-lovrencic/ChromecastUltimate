name: Auto Approve Dependabot

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  check_suite:
    types: [completed]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      (startsWith(github.event.pull_request.title, '[deps') ||
       contains(github.event.pull_request.labels.*.name, 'dependencies'))
    steps:
      - name: Check CI status
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            console.log('Checking CI status for PR #' + pr.number);
            
            // Get the check runs for the latest commit
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
              per_page: 100
            });
            
            // Check if all checks passed
            const allChecksPassed = checks.data.check_runs.every(run => 
              run.conclusion === 'success' || run.conclusion === 'skipped'
            );
            
            console.log('All checks passed:', allChecksPassed);
            return allChecksPassed;

      - name: Approve PR
        if: steps.check.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Check existing reviews
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            const alreadyApproved = reviews.data.some(r => 
              r.user.type === 'Bot' && r.state === 'APPROVED'
            );
            
            if (!alreadyApproved) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE'
              });
              console.log('Approved Dependabot PR #' + pr.number);
            }

  auto-merge:
    runs-on: ubuntu-latest
    needs: auto-approve
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      (startsWith(github.event.pull_request.title, '[deps') ||
       contains(github.event.pull_request.labels.*.name, 'dependencies'))
    steps:
      - name: Enable auto-merge
        run: |
          gh pr merge --admin --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
